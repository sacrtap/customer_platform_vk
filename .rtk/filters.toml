# Project-local RTK filters — commit this file with your repo.
# Filters here override user-global and built-in filters.
# Docs: https://github.com/rtk-ai/rtk#custom-filters
schema_version = 1

# --- Python 单行脚本 ---
[filters.python-one-liner]
description = "Compact python -c quick scripts and one-liners"
match_command = "^python(3)? -c"
strip_lines_matching = ["^Traceback", "^\\s*File ", "^$"]
max_lines = 15

# --- pytest 测试 ---
[filters.pytest]
description = "pytest output: keep failures, warnings, and summary only"
match_command = "^python(3)? -m pytest"
strip_lines_matching = [
  "^==.*==",
  "^platform",
  "^rootdir",
  "^plugins",
  "^collected \\d+ item",
  "^$"]
max_lines = 40

# --- pytest 覆盖率报告 ---
[filters.pytest-cov]
description = "pytest --cov: compress coverage table details"
match_command = "^python(3)? -m pytest.*--cov"
strip_lines_matching = [
  "^Name\\s+Stmts",
  "^TOTAL\\s+",
  "^-+",
  "^$"]
max_lines = 30

# --- black 格式化 ---
[filters.black]
description = "black formatter: show only modified files"
match_command = "^python(3)? -m black"
strip_lines_matching = [
  "^All done",
  "^would reformat",
  "^reformatted",
  "^$"]
max_lines = 10
on_empty = "black: all clean"

# --- flake8 检查 ---
[filters.flake8]
description = "flake8 lint: show errors only"
match_command = "^python(3)? -m flake8"
strip_lines_matching = ["^$"]
max_lines = 25

# --- alembic 迁移 ---
[filters.alembic]
description = "alembic migration: hide INFO logs, keep results"
match_command = "^python(3)? -m alembic"
strip_lines_matching = [
  "^INFO",
  "^Generating",
  "^\\s*$",
  "^Context impl"]
max_lines = 10

# --- graphify 图谱更新 ---
[filters.graphify]
description = "graphify update: hide processing steps, keep results"
match_command = "^graphify"
strip_lines_matching = [
  "^Extracting",
  "^Building",
  "^Clustering",
  "^Report",
  "^Processing",
  "^Scanning",
  "^\\s*$"]
max_lines = 15
on_empty = "graphify: done"

# --- npm run 前端命令 ---
[filters.npm-run]
description = "npm run scripts: compact dev/lint/type-check output"
match_command = "^npm run (dev|lint|format|type-check|test:e2e)"
strip_lines_matching = [
  "^npm (WARN|info|notice)",
  "^\\[vite\\]",
  "^  VITE",
  "^\\s*$"]
max_lines = 20

# --- 部署脚本 ---
[filters.deploy]
description = "deploy scripts: show only key steps and results"
match_command = "\\./deploy/scripts/(deploy|verify-deployment)\\.sh"
strip_lines_matching = [
  "^\\+ ",
  "^DEBUG",
  "^\\s*$"]
max_lines = 20

# --- uvicorn 启动 ---
[filters.uvicorn]
description = "uvicorn server startup: compact boot logs"
match_command = "^python(3)? -m uvicorn"
strip_lines_matching = [
  "^INFO",
  "^WARNING",
  "^\\s*$"]
max_lines = 10
