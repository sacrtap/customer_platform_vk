# Project-local RTK filters — commit this file with your repo.
# Filters here override user-global and built-in filters.
# Docs: https://github.com/rtk-ai/rtk#custom-filters
schema_version = 1

# --- Python 单行脚本 ---
[filters.python-one-liner]
description = "Compact python -c quick scripts and one-liners"
match_command = "^python(3)? -c"
strip_lines_matching = ["^Traceback", "^\\s*File ", "^$"]
max_lines = 15
on_empty = "python: no output"

# --- pytest 测试 ---
[filters.pytest]
description = "pytest output: keep failures, warnings, and summary only"
match_command = "^python(3)? -m pytest"
strip_lines_matching = [
  "^==.*==",
  "^platform",
  "^rootdir",
  "^plugins",
  "^collected \\d+ item",
  "^$"]
max_lines = 40
on_empty = "pytest: no tests found or all tests filtered"

# --- pytest 覆盖率报告 ---
[filters.pytest-cov]
description = "pytest --cov: compress coverage table details"
match_command = "^python(3)? -m pytest.*--cov"
strip_lines_matching = [
  "^Name\\s+Stmts",
  "^TOTAL\\s+",
  "^-+",
  "^$"]
max_lines = 30
on_empty = "pytest-cov: no coverage data"

# --- black 格式化 ---
[filters.black]
description = "black formatter: show only modified files"
match_command = "^python(3)? -m black"
strip_lines_matching = [
  "^All done",
  "^would reformat",
  "^reformatted",
  "^$"]
max_lines = 10
on_empty = "black: all clean"

# --- flake8 检查 ---
[filters.flake8]
description = "flake8 lint: show errors only"
match_command = "^python(3)? -m flake8"
strip_lines_matching = ["^$"]
max_lines = 25
on_empty = "flake8: no issues found"

# --- alembic 迁移 ---
[filters.alembic]
description = "alembic migration: hide INFO logs, keep results"
match_command = "^python(3)? -m alembic"
strip_lines_matching = [
  "^INFO",
  "^Generating",
  "^\\s*$",
  "^Context impl"]
max_lines = 10
on_empty = "alembic: no output"

# --- graphify 图谱更新 ---
[filters.graphify]
description = "graphify update: hide processing steps, keep results"
match_command = "^graphify"
strip_lines_matching = [
  "^Extracting",
  "^Building",
  "^Clustering",
  "^Report",
  "^Processing",
  "^Scanning",
  "^\\s*$"]
max_lines = 15
on_empty = "graphify: done"

# --- npm run 前端命令 ---
[filters.npm-run]
description = "npm run scripts: compact dev/lint/type-check output"
match_command = "^npm run (dev|lint|format|type-check|test:e2e)"
strip_lines_matching = [
  "^npm (WARN|info|notice)",
  "^\\[vite\\]",
  "^  VITE",
  "^\\s*$"]
max_lines = 20
on_empty = "npm: command completed (check logs for details)"

# --- 部署脚本 ---
[filters.deploy]
description = "deploy scripts: show only key steps and results"
match_command = "\\./deploy/scripts/(deploy|verify-deployment)\\.sh"
strip_lines_matching = [
  "^\\+ ",
  "^DEBUG",
  "^\\s*$"]
max_lines = 20
on_empty = "deploy: command completed"

# --- uvicorn 启动 ---
[filters.uvicorn]
description = "uvicorn server startup: compact boot logs"
match_command = "^python(3)? -m uvicorn"
strip_lines_matching = [
  "^INFO",
  "^WARNING",
  "^\\s*$"]
max_lines = 10
on_empty = "uvicorn: server starting (check logs)"

# --- ls 目录查看 ---
[filters.ls]
description = "ls: show tree format, fallback on empty"
match_command = "^ls"
on_empty = "(directory appears empty or all files filtered by RTK)"
max_lines = 30

# --- find 文件查找 ---
[filters.find]
description = "find: compact results"
match_command = "^find"
on_empty = "find: no files found"
max_lines = 20

# --- grep 内容搜索 ---
[filters.grep-shell]
description = "grep: grouped search results"
match_command = "^grep"
on_empty = "grep: no matches found (check if files are in ignored directories)"
max_lines = 30
