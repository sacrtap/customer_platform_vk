name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      test_level:
        description: "测试级别"
        required: true
        default: "full"
        type: choice
        options:
          - quick
          - full
          - performance

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "18"

jobs:
  # ============================================================
  # 数据库迁移测试
  # ============================================================
  migration-test:
    name: Database Migration Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run database migrations
        env:
          DATABASE_URL: postgresql+asyncpg://test_user:test_password@localhost:5432/test_db
        run: |
          cd backend
          python -m alembic upgrade head

      - name: Verify migration integrity
        env:
          DATABASE_URL: postgresql+asyncpg://test_user:test_password@localhost:5432/test_db
        run: |
          cd backend
          python -m alembic check

      - name: Test migration rollback
        env:
          DATABASE_URL: postgresql+asyncpg://test_user:test_password@localhost:5432/test_db
        run: |
          cd backend
          python -m alembic downgrade base
          python -m alembic upgrade head

  # ============================================================
  # API 集成测试 (需要真实数据库)
  # ============================================================
  api-integration-test:
    name: API Integration Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: customer_platform_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run database migrations
        env:
          DATABASE_URL: postgresql+asyncpg://test_user:test_password@localhost:5432/customer_platform_test
        run: |
          cd backend
          python -m alembic upgrade head

      - name: Run integration tests
        env:
          DATABASE_URL: postgresql+asyncpg://test_user:test_password@localhost:5432/customer_platform_test
          REDIS_URL: redis://localhost:6379/1
          JWT_SECRET: integration_test_jwt_secret
          JWT_ALGORITHM: HS256
          WEBHOOK_SECRET: integration_test_webhook_secret
        run: |
          cd backend
          pytest tests/integration/ -v --tb=short --cov=app --cov-report=xml --cov-report=term-missing

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: backend/htmlcov/
          retention-days: 7

  # ============================================================
  # 单元测试 (快速执行)
  # ============================================================
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run unit tests
        run: |
          cd backend
          pytest tests/unit/ -v --tb=short

  # ============================================================
  # 缓存服务测试
  # ============================================================
  cache-test:
    name: Cache Service Tests
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run cache tests
        env:
          REDIS_URL: redis://localhost:6379/1
        run: |
          cd backend
          pytest tests/test_cache.py -v --tb=short

  # ============================================================
  # 安全扫描
  # ============================================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety

      - name: Run Bandit security scan
        run: |
          bandit -r backend/app/ -f json -o bandit-report.json || true
          bandit -r backend/app/ -f txt -ll

      - name: Check dependencies for known vulnerabilities
        run: |
          cd backend
          safety check -r requirements.txt --json || true
          safety check -r requirements.txt

      - name: Upload security report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-results
          path: bandit-report.json
          retention-days: 30

  # ============================================================
  # 前端安全扫描
  # ============================================================
  frontend-security:
    name: Frontend Security
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Run npm audit
        run: |
          cd frontend
          npm audit --audit-level=moderate || true
          npm audit --json > npm-audit-report.json || true

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-audit-results
          path: frontend/npm-audit-report.json
          retention-days: 30

  # ============================================================
  # 性能基准测试
  # ============================================================
  performance-test:
    name: Performance Benchmark
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.test_level == 'performance' || github.event_name == 'push'

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: customer_platform_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run database migrations
        env:
          DATABASE_URL: postgresql+asyncpg://test_user:test_password@localhost:5432/customer_platform_test
        run: |
          cd backend
          python -m alembic upgrade head

      - name: Run performance tests
        env:
          DATABASE_URL: postgresql+asyncpg://test_user:test_password@localhost:5432/customer_platform_test
          REDIS_URL: redis://localhost:6379/1
          JWT_SECRET: perf_test_jwt_secret
          JWT_ALGORITHM: HS256
        run: |
          cd backend
          pytest tests/performance/ -v --tb=short

      - name: Upload performance results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-results
          path: backend/htmlcov/
          retention-days: 30

  # ============================================================
  # 集成测试质量门禁
  # ============================================================
  integration-quality-gate:
    name: Integration Quality Gate
    runs-on: ubuntu-latest
    needs: [migration-test, api-integration-test, unit-test, cache-test, security-scan, frontend-security]
    if: always()

    steps:
      - name: Check all jobs passed
        run: |
          echo "========================================="
          echo "Integration Test Quality Gate Results"
          echo "========================================="
          echo "Migration Test:        ${{ needs.migration-test.result }}"
          echo "API Integration Test:  ${{ needs.api-integration-test.result }}"
          echo "Unit Test:             ${{ needs.unit-test.result }}"
          echo "Cache Test:            ${{ needs.cache-test.result }}"
          echo "Security Scan:         ${{ needs.security-scan.result }}"
          echo "Frontend Security:     ${{ needs.frontend-security.result }}"
          echo "========================================="

          FAILED_JOBS=""
          for result in "${{ needs.migration-test.result }}" "${{ needs.api-integration-test.result }}" "${{ needs.unit-test.result }}" "${{ needs.cache-test.result }}" "${{ needs.security-scan.result }}" "${{ needs.frontend-security.result }}"; do
            if [ "$result" != "success" ]; then
              FAILED_JOBS="$FAILED_JOBS $result"
            fi
          done

          if [ -n "$FAILED_JOBS" ]; then
            echo "❌ Quality gate failed. Failed jobs:$FAILED_JOBS"
            exit 1
          fi

          echo "✅ All integration quality checks passed"
