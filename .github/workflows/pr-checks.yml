name: PR Checks

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # 快速检查 - 代码格式 + Lint (无数据库依赖)
  # ============================================================
  quick-checks:
    name: Quick Checks (Lint + Format)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Python linting and formatting (ruff)
        run: |
          cd backend
          ruff check app/ tests/
          ruff format app/ tests/ --check

      - name: Frontend linting
        run: |
          cd frontend
          npm run lint

      - name: Frontend type check
        run: |
          cd frontend
          npx vue-tsc --noEmit

      - name: Frontend unit tests
        run: |
          cd frontend
          npx vitest run --reporter=verbose

  # ============================================================
  # 后端单元测试 (无数据库依赖, 快速运行)
  # ============================================================
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run unit tests
        env:
          JWT_SECRET: test-secret-key-for-ci
          JWT_ACCESS_TOKEN_EXPIRE_MINUTES: 30
          JWT_REFRESH_TOKEN_EXPIRE_DAYS: 7
        run: |
          cd backend
          pytest tests/unit/ -n auto --cov=app --cov-report=term-missing --cov-fail-under=25 --junitxml=junit.xml

      - name: Upload JUnit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-backend-junit
          path: backend/junit.xml
          retention-days: 3

  # ============================================================
  # 前端构建
  # ============================================================
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Build
        run: |
          cd frontend
          npm run build

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-frontend-dist
          path: frontend/dist/
          retention-days: 3

  # ============================================================
  # E2E 测试 (Playwright)
  # ============================================================
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run database migrations
        env:
          DATABASE_URL: postgresql+asyncpg://test_user:test_password@localhost:5432/test_db
        run: |
          cd backend
          python -m alembic upgrade head

      - name: Seed test data
        env:
          DATABASE_URL: postgresql+asyncpg://test_user:test_password@localhost:5432/test_db
        run: |
          cd backend
          python scripts/seed.py --reset

      - name: Start backend server
        env:
          DATABASE_URL: postgresql+asyncpg://test_user:test_password@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: test-secret-key-for-ci
          DEBUG: "false"
          APP_ENV: testing
        run: |
          cd backend
          python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          # 带重试的健康检查（最多等待 30 秒）
          for i in $(seq 1 15); do
            if curl -s http://localhost:8000/health | grep -q "healthy"; then
              echo "✅ Backend is healthy"
              exit 0
            fi
            echo "Waiting for backend... (attempt $i/15)"
            sleep 2
          done
          echo "❌ Backend failed to start"
          exit 1

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Start frontend preview server
        run: |
          cd frontend
          npx vite preview --port 5173 --host 0.0.0.0 &
          sleep 3

      - name: Install Playwright browsers
        run: |
          cd frontend
          npx playwright install --with-deps chromium

      - name: Run E2E tests (smoke suite only)
        env:
          API_BASE_URL: http://localhost:8000
        run: |
          cd frontend
          npx playwright test --project=chromium --grep="@smoke" --reporter=list

      - name: Upload E2E test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-e2e-smoke-results
          path: frontend/tests/e2e/playwright-report/
          retention-days: 7

      - name: Upload E2E test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pr-e2e-smoke-failures
          path: frontend/tests/e2e/test-results/
          retention-days: 3

  # ============================================================
  # PR 质量门禁
  # ============================================================
  pr-quality-gate:
    name: PR Quality Gate
    runs-on: ubuntu-latest
    needs: [quick-checks, backend-tests, frontend-build, e2e-tests]
    if: always()

    steps:
      - name: Check all jobs passed
        run: |
          echo "========================================="
          echo "PR Quality Gate Results"
          echo "========================================="
          echo "Quick Checks:    ${{ needs.quick-checks.result }}"
          echo "Backend Tests:   ${{ needs.backend-tests.result }}"
          echo "Frontend Build:  ${{ needs.frontend-build.result }}"
          echo "E2E Tests:       ${{ needs.e2e-tests.result }}"
          echo "========================================="

          # E2E 测试当前为非阻塞（已知失败用例，待 TD-012 修复后改为阻塞）
          if [ "${{ needs.quick-checks.result }}" != "success" ] || \
             [ "${{ needs.backend-tests.result }}" != "success" ] || \
             [ "${{ needs.frontend-build.result }}" != "success" ]; then
            echo "❌ PR quality gate failed"
            exit 1
          fi

          if [ "${{ needs.e2e-tests.result }}" != "success" ]; then
            echo "⚠️  E2E smoke tests have failures (non-blocking, tracked in TD-012)"
            echo "   Full E2E suite runs nightly — see e2e-nightly.yml"
          fi

          echo "ℹ️  Note: Backend integration tests run nightly (not in PR checks)"
          echo "   Unit tests (360) run in PR checks; Integration tests (180) run nightly"

          echo "✅ All PR quality checks passed"
