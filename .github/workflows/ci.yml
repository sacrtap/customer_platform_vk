name: CI

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'deploy/**'
      - '.github/workflows/ci.yml'
      - '.github/workflows/deploy.yml'
      - 'backend/requirements.txt'
      - 'frontend/package.json'
      - 'frontend/package-lock.json'

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # Backend CI - 快速检查（lint + 单元测试）
  # ============================================================
  backend-test:
    name: Backend Quick Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run linting (flake8)
        run: |
          flake8 backend/app/ backend/tests/ --max-line-length=120 --extend-ignore=E203

      - name: Run code formatting check (black)
        run: |
          black backend/app/ backend/tests/ --check --diff

      - name: Run unit tests only (fast)
        run: |
          cd backend
          pytest tests/unit/ -v --tb=short

  # ============================================================
  # Frontend CI - 快速检查（lint + type check + build）
  # ============================================================
  frontend-check:
    name: Frontend Quick Check
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      contains(github.event.pull_request.labels.*.name, 'frontend')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Run linting
        run: |
          cd frontend
          npm run lint

      - name: Type check
        run: |
          cd frontend
          npx vue-tsc --noEmit

      - name: Build
        run: |
          cd frontend
          npm run build

  # ============================================================
  # Code Quality Summary
  # ============================================================
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-check]
    if: always()

    steps:
      - name: Check all jobs passed
        run: |
          echo "Backend Quick Check: ${{ needs.backend-test.result }}"
          echo "Frontend Quick Check: ${{ needs.frontend-check.result }}"

          if [ "${{ needs.backend-test.result }}" != "success" ] || [ "${{ needs.frontend-check.result }}" != "success" ]; then
            echo "❌ Quality gate failed"
            exit 1
          fi

          echo "✅ All quick checks passed"
