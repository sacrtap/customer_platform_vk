name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types:
      - completed

  # 手动触发部署
  workflow_dispatch:
    inputs:
      environment:
        description: "部署环境"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production
      version:
        description: "部署版本 (默认使用 commit SHA)"
        required: false
        type: string

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"

jobs:
  # ============================================================
  # 构建并推送镜像
  # ============================================================
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./deploy/docker/Containerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.tag }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 30

  # ============================================================
  # 部署到 Staging 环境
  # ============================================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging' || github.event_name == 'workflow_run' }}
    environment:
      name: staging
      url: http://staging.example.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to staging server
        env:
          SSH_PRIVATE_KEY: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
          SSH_USER: ${{ secrets.STAGING_SSH_USER }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          DB_USER: ${{ secrets.STAGING_DB_USER }}
          DB_PASSWORD: ${{ secrets.STAGING_DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.STAGING_JWT_SECRET }}
        run: |
          echo "🚀 部署到 Staging 环境..."
          echo "镜像标签: ${IMAGE_TAG}"
          
          # 这里使用 SSH 连接到 staging 服务器执行部署
          # 实际使用时需要配置 SSH 密钥和服务器信息
          # 示例:
          # echo "$SSH_PRIVATE_KEY" | ssh-add -
          # ssh -o StrictHostKeyChecking=no ${SSH_USER}@${SSH_HOST} << 'EOF'
          #   cd /opt/customer_platform
          #   ./deploy/scripts/deploy.sh ${IMAGE_TAG}
          # EOF
          
          echo "⚠️  请配置 SSH 密钥和服务器信息后启用实际部署"
          echo "✅ Staging 部署流程已准备就绪"

  # ============================================================
  # 部署到 Production 环境 (需要手动审批)
  # ============================================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-push
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production' }}
    environment:
      name: production
      url: http://production.example.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to production server
        env:
          SSH_PRIVATE_KEY: ${{ secrets.PRODUCTION_SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.PRODUCTION_SSH_HOST }}
          SSH_USER: ${{ secrets.PRODUCTION_SSH_USER }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          DB_USER: ${{ secrets.PRODUCTION_DB_USER }}
          DB_PASSWORD: ${{ secrets.PRODUCTION_DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.PRODUCTION_JWT_SECRET }}
        run: |
          echo "🚀 部署到 Production 环境..."
          echo "镜像标签: ${IMAGE_TAG}"
          
          # 这里使用 SSH 连接到 production 服务器执行部署
          # 实际使用时需要配置 SSH 密钥和服务器信息
          # 示例:
          # echo "$SSH_PRIVATE_KEY" | ssh-add -
          # ssh -o StrictHostKeyChecking=no ${SSH_USER}@${SSH_HOST} << 'EOF'
          #   cd /opt/customer_platform
          #   ./deploy/scripts/deploy.sh ${IMAGE_TAG}
          # EOF
          
          echo "⚠️  请配置 SSH 密钥和服务器信息后启用实际部署"
          echo "✅ Production 部署流程已准备就绪"

  # ============================================================
  # 部署后健康检查
  # ============================================================
  health-check:
    name: Post-Deploy Health Check
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production]
    if: always() && (needs.deploy-staging.result == 'success' || needs.deploy-production.result == 'success')

    steps:
      - name: Run health check
        run: |
          echo "🔍 执行健康检查..."
          
          # 根据部署的环境选择检查 URL
          if [ "${{ needs.deploy-staging.result }}" == "success" ]; then
            HEALTH_URL="http://staging.example.com/health"
          else
            HEALTH_URL="http://production.example.com/health"
          fi
          
          echo "检查地址: ${HEALTH_URL}"
          
          # 实际部署时取消注释
          # response=$(curl -s -o /dev/null -w "%{http_code}" ${HEALTH_URL})
          # if [ "$response" == "200" ]; then
          #   echo "✅ 健康检查通过"
          # else
          #   echo "❌ 健康检查失败 (HTTP ${response})"
          #   exit 1
          # fi
          
          echo "⚠️  请配置实际服务器地址后启用健康检查"
          echo "✅ 健康检查流程已准备就绪"
