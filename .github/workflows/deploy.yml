name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types:
      - completed

  # 手动触发部署
  workflow_dispatch:
    inputs:
      environment:
        description: "部署环境"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production
      version:
        description: "部署版本 (默认使用 commit SHA)"
        required: false
        type: string

# 允许写入packages权限（GHCR推送需要）
permissions:
  contents: read
  packages: write

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "18"

jobs:
  # ============================================================
  # 构建并推送镜像
  # ============================================================
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./deploy/docker/Containerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.tag }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 30

  # ============================================================
  # 部署到 Staging 环境
  # ============================================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging' || github.event_name == 'workflow_run' }}
    environment:
      name: staging
      url: https://staging.jiazoushi.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o /usr/local/bin/cloudflared
          chmod +x /usr/local/bin/cloudflared
          cloudflared --version

      - name: Deploy to staging server
        env:
          SSH_PRIVATE_KEY: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
          SSH_USER: ${{ secrets.STAGING_SSH_USER }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          DB_USER: ${{ secrets.STAGING_DB_USER }}
          DB_PASSWORD: ${{ secrets.STAGING_DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.STAGING_JWT_SECRET }}
          HEALTH_URL: "http://localhost:8000/health"
        run: |
          echo "🚀 部署到 Staging 环境..."
          echo "镜像标签: ${IMAGE_TAG}"

          # 设置 SSH 密钥
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/staging_key
          chmod 600 ~/.ssh/staging_key

          # 通过 Cloudflare Tunnel 远程执行部署
          # 使用 cloudflared access 作为 SSH 代理
          ssh -i ~/.ssh/staging_key \
              -o StrictHostKeyChecking=no \
              -o ProxyCommand="cloudflared access ssh --hostname ${SSH_HOST}" \
              ${SSH_USER}@${SSH_HOST} << EOF
            cd ~/Documents/github/customer_platform_vk
            git fetch origin main
            git reset --hard origin/main
            export IMAGE_TAG="${IMAGE_TAG}"
            export GITHUB_REPOSITORY="${GITHUB_REPOSITORY}"
            export DB_USER="${DB_USER}"
            export DB_PASSWORD="${DB_PASSWORD}"
            export JWT_SECRET="${JWT_SECRET}"
            export HEALTH_URL="${HEALTH_URL}"
            ./deploy/scripts/deploy.sh --use-remote-image "${IMAGE_TAG}"
          EOF

          echo "✅ Staging 部署完成"

  # ============================================================
  # 部署到 Production 环境 (需要手动审批)
  # ============================================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-push
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production' }}
    environment:
      name: production
      url: https://production.jiazoushi.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o /usr/local/bin/cloudflared
          chmod +x /usr/local/bin/cloudflared
          cloudflared --version

      - name: Deploy to production server
        env:
          SSH_PRIVATE_KEY: ${{ secrets.PRODUCTION_SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.PRODUCTION_SSH_HOST }}
          SSH_USER: ${{ secrets.PRODUCTION_SSH_USER }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          DB_USER: ${{ secrets.PRODUCTION_DB_USER }}
          DB_PASSWORD: ${{ secrets.PRODUCTION_DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.PRODUCTION_JWT_SECRET }}
          HEALTH_URL: "http://localhost:8000/health"
        run: |
          echo "🚀 部署到 Production 环境..."
          echo "镜像标签: ${IMAGE_TAG}"

          # 设置 SSH 密钥
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/production_key
          chmod 600 ~/.ssh/production_key

          # 通过 Cloudflare Tunnel 远程执行部署
          ssh -i ~/.ssh/production_key \
              -o StrictHostKeyChecking=no \
              -o ProxyCommand="cloudflared access ssh --hostname ${SSH_HOST}" \
              ${SSH_USER}@${SSH_HOST} << EOF
            cd ~/Documents/github/customer_platform_vk
            git fetch origin main
            git reset --hard origin/main
            export IMAGE_TAG="${IMAGE_TAG}"
            export GITHUB_REPOSITORY="${GITHUB_REPOSITORY}"
            export DB_USER="${DB_USER}"
            export DB_PASSWORD="${DB_PASSWORD}"
            export JWT_SECRET="${JWT_SECRET}"
            export HEALTH_URL="${HEALTH_URL}"
            ./deploy/scripts/deploy.sh --use-remote-image "${IMAGE_TAG}"
          EOF

          echo "✅ Production 部署完成"

  # ============================================================
  # 部署后健康检查
  # ============================================================
  health-check:
    name: Post-Deploy Health Check
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production]
    if: always() && (needs.deploy-staging.result == 'success' || needs.deploy-production.result == 'success')

    steps:
      - name: Run health check
        run: |
          echo "🔍 执行健康检查..."

          # 根据部署的环境选择检查 URL
          if [ "${{ needs.deploy-staging.result }}" == "success" ]; then
            HEALTH_URL="https://staging.jiazoushi.com/health"
          else
            HEALTH_URL="https://production.jiazoushi.com/health"
          fi

          echo "检查地址: ${HEALTH_URL}"

          response=$(curl -s -o /dev/null -w "%{http_code}" ${HEALTH_URL})
          if [ "$response" == "200" ]; then
            echo "✅ 健康检查通过"
          else
            echo "❌ 健康检查失败 (HTTP ${response})"
            exit 1
          fi
