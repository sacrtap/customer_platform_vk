# 告警规则配置

groups:
  - name: customer_platform_alerts
    rules:
      # API 错误率告警
      - alert: HighAPIErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "API 错误率过高"
          description: "API 5xx 错误率超过 10%"
      
      # API 响应时间告警
      - alert: HighAPILatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "API 响应时间过长"
          description: "API P95 响应时间超过 500ms"
      
      # 数据库连接告警
      - alert: DatabaseConnectionPoolExhausted
        expr: pg_stat_activity_count >= pg_settings_max_connections
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "数据库连接池耗尽"
          description: "PostgreSQL 连接数达到上限"
      
      # 磁盘空间告警
      - alert: LowDiskSpace
        expr: (node_filesystem_avail_bytes / node_filesystem_size_bytes) * 100 < 20
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "磁盘空间不足"
          description: "磁盘可用空间低于 20%"
      
      # 应用宕机告警
      - alert: ApplicationDown
        expr: up{job="customer-platform"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "应用宕机"
          description: "客户运营中台应用不可用"
