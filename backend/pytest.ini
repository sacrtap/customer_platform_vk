[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# 开发环境默认选项（快速运行，不收集覆盖率）
addopts = -v --tb=short

# CI 环境通过命令行额外参数覆盖：
# pytest --cov=app --cov-report=xml --cov-report=term-missing --cov-fail-under=50 -n auto

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
