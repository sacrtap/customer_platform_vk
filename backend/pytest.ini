[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto

# 开发环境默认选项（快速运行，不收集覆盖率）
addopts = -v --tb=short
norecursedirs = performance  # Performance tests use locust/gevent (incompatible with pytest-xdist)

# 注册自定义 markers
markers =
    xdist_group: Group tests to run in the same xdist worker (prevents DB conflicts)

# CI 环境通过命令行额外参数覆盖：
# pytest --cov=app --cov-report=xml --cov-report=term-missing --cov-fail-under=50 -n auto

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
