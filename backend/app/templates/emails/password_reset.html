<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>密码重置</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .container {
            background-color: #ffffff;
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .header {
            border-bottom: 2px solid #1d4ed8;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        .header h1 {
            color: #1d4ed8;
            margin: 0;
            font-size: 24px;
        }
        .greeting {
            font-size: 16px;
            margin-bottom: 15px;
        }
        .info-box {
            background-color: #eff6ff;
            border: 1px solid #bfdbfe;
            border-radius: 4px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .btn {
            display: inline-block;
            background-color: #1d4ed8;
            color: #ffffff;
            padding: 12px 28px;
            text-decoration: none;
            border-radius: 6px;
            margin: 15px 0;
            font-weight: 600;
            font-size: 15px;
        }
        .btn:hover {
            background-color: #2563eb;
        }
        .expiry-warning {
            color: #dc2626;
            font-weight: 600;
        }
        .footer {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e8e8e8;
            font-size: 14px;
            color: #666;
        }
        .reset-link {
            word-break: break-all;
            font-size: 12px;
            color: #999;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔑 密码重置</h1>
        </div>

        <div class="greeting">
            尊敬的 {{ user_name }}，您好！
        </div>

        <p>
            我们收到了您的密码重置请求。请点击下方按钮重置您的密码：
        </p>

        <div style="text-align: center;">
            <a href="{{ reset_link }}" class="btn">重置密码</a>
        </div>

        <div class="info-box">
            <p style="margin: 0;">
                <span class="expiry-warning">⏰ 该链接将在 2 小时后失效。</span>
                <br>
                如果您没有发起密码重置请求，请忽略此邮件，您的密码不会被更改。
            </p>
        </div>

        <p>
            如果按钮无法点击，请复制以下链接到浏览器地址栏：
        </p>
        <div class="reset-link">{{ reset_link }}</div>

        <div class="footer">
            <p>
                此邮件由客户运营中台系统自动发送，请勿回复。
            </p>
            <p style="margin: 5px 0;">
                如有问题，请联系系统管理员。
            </p>
        </div>
    </div>
</body>
</html>
