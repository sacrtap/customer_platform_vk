<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录 - 客户运营中台</title>
  <link rel="stylesheet" href="css/login.css" />
</head>
<body>
  <div class="login-shell">
    <!-- 左侧品牌展示区 -->
    <div class="brand-side">
      <div class="brand-header">
        <div class="brand-logo">
          <div class="mark">VK</div>
          <div>
            <div class="brand-title">客户运营中台</div>
            <div class="brand-subtitle">Customer Operations Platform</div>
          </div>
        </div>
      </div>

      <div class="brand-content">
        <div class="feature-item">
          <div class="feature-icon">
            <svg viewBox="0 0 24 24"><path d="M3 3v18h18"/><path d="M18.7 8l-5.1 5.2-2.8-2.8L7 14.3"/></svg>
          </div>
          <div class="feature-text">
            <h3>数据驱动决策</h3>
            <p>实时监控客户消耗、回款、健康度等核心指标，快速识别异常与机会</p>
          </div>
        </div>

        <div class="feature-item">
          <div class="feature-icon">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
          </div>
          <div class="feature-text">
            <h3>高效运营管理</h3>
            <p>统一的客户管理、结算管理、画像分析工作台，提升运营效率</p>
          </div>
        </div>

        <div class="feature-item">
          <div class="feature-icon">
            <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          </div>
          <div class="feature-text">
            <h3>安全可控</h3>
            <p>RBAC 权限模型、完整审计日志、并发安全保障</p>
          </div>
        </div>
      </div>

      <div class="brand-footer">
        © 2026 客户运营中台 · 企业内部系统
      </div>
    </div>

    <!-- 右侧登录表单区 -->
    <div class="form-side">
      <div class="form-header">
        <h1 class="form-title">欢迎回来</h1>
        <p class="form-desc">请登录您的账号以继续使用系统</p>
      </div>

      <form class="form-content" onsubmit="handleLogin(event)">
        <div class="form-field">
          <label class="form-label" for="username">账号</label>
          <input
            type="text"
            id="username"
            class="form-input"
            placeholder="请输入用户名或邮箱"
            required
            autocomplete="username"
          />
        </div>

        <div class="form-field">
          <label class="form-label" for="password">密码</label>
          <input
            type="password"
            id="password"
            class="form-input"
            placeholder="请输入密码"
            required
            autocomplete="current-password"
          />
        </div>

        <div class="form-options">
          <label class="checkbox-wrapper">
            <input type="checkbox" class="checkbox" id="remember" />
            <span>记住我</span>
          </label>
          <a href="#" class="link">忘记密码？</a>
        </div>

        <button type="submit" class="btn btn-primary">
          <span>登录</span>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </button>

        <div class="divider">或</div>

        <button type="button" class="btn btn-secondary" onclick="handleSSO()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <span>使用企业 SSO 登录</span>
        </button>
      </form>

      <div class="form-footer">
        还没有账号？<a href="#" class="link">联系管理员开通</a>
      </div>
    </div>
  </div>

  <script src="js/login.js"></script>
</body>
</html>
