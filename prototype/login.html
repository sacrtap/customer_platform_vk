<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录 - 客户运营中台</title>
  <style>
    :root{
      --bg:#f6f8fb;--panel:#ffffff;--ink:#0f172a;--muted:#475569;--soft:#e2e8f0;--line:#dbe3ef;
      --primary:#1d4ed8;--primary-2:#2563eb;--cyan:#0891b2;--green:#059669;--amber:#d97706;--red:#dc2626;--violet:#7c3aed;
      --shadow:0 14px 40px rgba(15,23,42,.08);--radius:18px;--radius-sm:12px;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      min-height:100vh;
      background:var(--bg);
      color:var(--ink);
      font-family:Inter,"PingFang SC","Microsoft YaHei",system-ui,sans-serif;
      font-size:14px;
      line-height:1.45;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }
    .login-shell{
      display:grid;
      grid-template-columns:480px 520px;
      gap:0;
      max-width:1000px;
      width:100%;
      min-height:600px;
      background:var(--panel);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
    }
    /* 左侧品牌展示区 */
    .brand-side{
      background:radial-gradient(circle at 20% 0%,rgba(37,99,235,.28),transparent 32%),linear-gradient(180deg,#111c33 0%,#0b1220 100%);
      color:#cbd5e1;
      padding:48px 40px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      position:relative;
      overflow:hidden;
    }
    .brand-side::before{
      content:'';
      position:absolute;
      top:-50%;
      left:-50%;
      width:200%;
      height:200%;
      background:radial-gradient(circle,rgba(59,130,246,.15) 0%,transparent 60%);
      animation:pulse 8s ease-in-out infinite;
    }
    @keyframes pulse{
      0%,100%{transform:scale(1);opacity:.5}
      50%{transform:scale(1.1);opacity:.8}
    }
    .brand-header{
      position:relative;
      z-index:1;
    }
    .brand-logo{
      display:flex;
      align-items:center;
      gap:14px;
      margin-bottom:48px;
    }
    .mark{
      width:48px;
      height:48px;
      border-radius:16px;
      background:linear-gradient(135deg,#3b82f6,#06b6d4);
      display:grid;
      place-items:center;
      color:white;
      font-weight:900;
      font-size:20px;
      box-shadow:0 10px 28px rgba(37,99,235,.34);
      flex-shrink:0;
    }
    .brand-title{
      color:white;
      font-size:24px;
      font-weight:850;
      line-height:1.2;
    }
    .brand-subtitle{
      color:#94a3b8;
      font-size:13px;
      margin-top:4px;
    }
    .brand-content{
      position:relative;
      z-index:1;
      flex:1;
      display:flex;
      flex-direction:column;
      justify-content:center;
      gap:32px;
    }
    .feature-item{
      display:flex;
      gap:16px;
      align-items:flex-start;
    }
    .feature-icon{
      width:40px;
      height:40px;
      border-radius:10px;
      background:rgba(59,130,246,.15);
      display:grid;
      place-items:center;
      flex-shrink:0;
    }
    .feature-icon svg{
      width:20px;
      height:20px;
      stroke:#3b82f6;
      fill:none;
      stroke-width:2;
    }
    .feature-text h3{
      color:white;
      font-size:15px;
      font-weight:700;
      margin-bottom:4px;
    }
    .feature-text p{
      color:#94a3b8;
      font-size:13px;
      line-height:1.5;
    }
    .brand-footer{
      position:relative;
      z-index:1;
      color:#64748b;
      font-size:12px;
      text-align:center;
    }
    /* 右侧登录表单区 */
    .form-side{
      padding:48px 56px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      background:var(--panel);
    }
    .form-header{
      margin-bottom:36px;
    }
    .form-title{
      font-size:28px;
      font-weight:800;
      color:var(--ink);
      margin-bottom:8px;
    }
    .form-desc{
      color:var(--muted);
      font-size:14px;
    }
    .form-content{
      display:flex;
      flex-direction:column;
      gap:20px;
    }
    .form-field{
      display:flex;
      flex-direction:column;
      gap:8px;
    }
    .form-label{
      font-size:13px;
      font-weight:600;
      color:var(--ink);
    }
    .form-input{
      width:100%;
      padding:12px 14px;
      border:1px solid var(--line);
      border-radius:var(--radius-sm);
      font-size:14px;
      color:var(--ink);
      background:var(--panel);
      transition:all .2s ease;
    }
    .form-input:focus{
      outline:none;
      border-color:var(--primary);
      box-shadow:0 0 0 3px rgba(29,78,216,.1);
    }
    .form-input::placeholder{
      color:#94a3b8;
    }
    .form-options{
      display:flex;
      align-items:center;
      justify-content:space-between;
      font-size:13px;
    }
    .checkbox-wrapper{
      display:flex;
      align-items:center;
      gap:8px;
      cursor:pointer;
    }
    .checkbox{
      width:16px;
      height:16px;
      border:1.5px solid var(--line);
      border-radius:4px;
      cursor:pointer;
      transition:all .2s ease;
    }
    .checkbox:checked{
      background:var(--primary);
      border-color:var(--primary);
    }
    .link{
      color:var(--primary);
      text-decoration:none;
      font-weight:500;
      transition:color .2s ease;
    }
    .link:hover{
      color:var(--primary-2);
    }
    .btn{
      width:100%;
      padding:13px 20px;
      border:none;
      border-radius:var(--radius-sm);
      font-size:14px;
      font-weight:600;
      cursor:pointer;
      transition:all .2s ease;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
    }
    .btn-primary{
      background:linear-gradient(135deg,var(--primary),var(--primary-2));
      color:white;
      box-shadow:0 8px 20px rgba(29,78,216,.25);
    }
    .btn-primary:hover{
      transform:translateY(-1px);
      box-shadow:0 12px 28px rgba(29,78,216,.35);
    }
    .btn-primary:active{
      transform:translateY(0);
    }
    .btn-secondary{
      background:var(--bg);
      color:var(--ink);
      border:1px solid var(--line);
    }
    .btn-secondary:hover{
      background:var(--soft);
    }
    .divider{
      display:flex;
      align-items:center;
      gap:12px;
      color:var(--muted);
      font-size:12px;
      margin:8px 0;
    }
    .divider::before,.divider::after{
      content:'';
      flex:1;
      height:1px;
      background:var(--line);
    }
    .form-footer{
      margin-top:32px;
      text-align:center;
      color:var(--muted);
      font-size:13px;
    }
    /* 响应式 */
    @media (max-width:960px){
      .login-shell{
        grid-template-columns:1fr;
        max-width:520px;
      }
      .brand-side{
        padding:32px 28px;
        min-height:280px;
      }
      .brand-logo{
        margin-bottom:24px;
      }
      .brand-content{
        gap:20px;
      }
      .feature-item:nth-child(n+3){
        display:none;
      }
    }
    @media (max-width:640px){
      body{
        padding:0;
      }
      .login-shell{
        border-radius:0;
        min-height:100vh;
      }
      .form-side{
        padding:32px 24px;
      }
    }
  </style>
</head>
<body>
  <div class="login-shell">
    <!-- 左侧品牌展示区 -->
    <div class="brand-side">
      <div class="brand-header">
        <div class="brand-logo">
          <div class="mark">VK</div>
          <div>
            <div class="brand-title">客户运营中台</div>
            <div class="brand-subtitle">Customer Operations Platform</div>
          </div>
        </div>
      </div>
      
      <div class="brand-content">
        <div class="feature-item">
          <div class="feature-icon">
            <svg viewBox="0 0 24 24"><path d="M3 3v18h18"/><path d="M18.7 8l-5.1 5.2-2.8-2.8L7 14.3"/></svg>
          </div>
          <div class="feature-text">
            <h3>数据驱动决策</h3>
            <p>实时监控客户消耗、回款、健康度等核心指标，快速识别异常与机会</p>
          </div>
        </div>
        
        <div class="feature-item">
          <div class="feature-icon">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
          </div>
          <div class="feature-text">
            <h3>高效运营管理</h3>
            <p>统一的客户管理、结算管理、画像分析工作台，提升运营效率</p>
          </div>
        </div>
        
        <div class="feature-item">
          <div class="feature-icon">
            <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          </div>
          <div class="feature-text">
            <h3>安全可控</h3>
            <p>RBAC 权限模型、完整审计日志、并发安全保障</p>
          </div>
        </div>
      </div>
      
      <div class="brand-footer">
        © 2026 客户运营中台 · 企业内部系统
      </div>
    </div>
    
    <!-- 右侧登录表单区 -->
    <div class="form-side">
      <div class="form-header">
        <h1 class="form-title">欢迎回来</h1>
        <p class="form-desc">请登录您的账号以继续使用系统</p>
      </div>
      
      <form class="form-content" onsubmit="handleLogin(event)">
        <div class="form-field">
          <label class="form-label" for="username">账号</label>
          <input 
            type="text" 
            id="username" 
            class="form-input" 
            placeholder="请输入用户名或邮箱"
            required
            autocomplete="username"
          />
        </div>
        
        <div class="form-field">
          <label class="form-label" for="password">密码</label>
          <input 
            type="password" 
            id="password" 
            class="form-input" 
            placeholder="请输入密码"
            required
            autocomplete="current-password"
          />
        </div>
        
        <div class="form-options">
          <label class="checkbox-wrapper">
            <input type="checkbox" class="checkbox" id="remember" />
            <span>记住我</span>
          </label>
          <a href="#" class="link">忘记密码？</a>
        </div>
        
        <button type="submit" class="btn btn-primary">
          <span>登录</span>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </button>
        
        <div class="divider">或</div>
        
        <button type="button" class="btn btn-secondary" onclick="handleSSO()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <span>使用企业 SSO 登录</span>
        </button>
      </form>
      
      <div class="form-footer">
        还没有账号？<a href="#" class="link">联系管理员开通</a>
      </div>
    </div>
  </div>

  <script>
    function handleLogin(event) {
      event.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const remember = document.getElementById('remember').checked;
      
      // 原型演示：显示登录信息
      alert(`登录信息：\n账号：${username}\n记住我：${remember ? '是' : '否'}\n\n（原型演示，实际需调用后端 API）`);
      
      // 实际登录逻辑（示例）
      // fetch('/api/auth/login', {
      //   method: 'POST',
      //   headers: { 'Content-Type': 'application/json' },
      //   body: JSON.stringify({ username, password, remember })
      // }).then(res => res.json()).then(data => {
      //   if (data.success) {
      //     window.location.href = '/index.html';
      //   } else {
      //     alert(data.message || '登录失败');
      //   }
      // });
    }
    
    function handleSSO() {
      alert('企业 SSO 登录（原型演示）\n\n实际实现将跳转到企业统一认证页面');
      // window.location.href = '/api/auth/sso/redirect';
    }
    
    // 键盘快捷键支持
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && e.target.tagName !== 'BUTTON') {
        document.querySelector('form').requestSubmit();
      }
    });
  </script>
</body>
</html>
